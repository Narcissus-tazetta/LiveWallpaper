# SwiftLint configuration for LiveWallpaper
# see https://github.com/realm/SwiftLint for rule descriptions

included:
    - Sources

excluded:
    - Carthage
    - Pods
    - .build
    - scripts

# begin with a reasonable baseline
disabled_rules:
    - line_length # allow longer lines when readability matters
    - trailing_whitespace
    - todo
    - file_length
    - type_body_length
    - function_body_length
    - identifier_name
    - multiple_closures_with_trailing_closure
    - opening_brace
    - closure_parameter_position

opt_in_rules:
    - empty_count
    - explicit_init
    - prefer_self_type_over_type_of_self

cyclomatic_complexity:
    warning: 15
    error: 30

function_parameter_count:
    warning: 8
    error: 12
